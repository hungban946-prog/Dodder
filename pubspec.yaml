name: dodder
description: Ứng dụng tình yêu dành cho cặp đôi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  google_sign_in: ^6.1.5
  image_picker: ^1.0.4
  intl: ^0.18.1
  flutter_dotenv: ^5.1.0
  provider: ^6.0.5
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/fonts/